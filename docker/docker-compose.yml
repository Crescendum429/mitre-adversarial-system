services:

  # ---------------------------------------------------------------------------
  # Contenedor atacante: Kali Linux con herramientas de pentesting.
  # El agente atacante ejecuta comandos aqui via Docker SDK (docker exec).
  # ---------------------------------------------------------------------------
  attacker:
    build:
      context: ./attacker
    container_name: attacker
    hostname: attacker
    networks:
      attack_net:
        ipv4_address: 10.10.0.5
    cap_add:
      - NET_RAW      # Necesario para nmap SYN scan
      - NET_ADMIN    # Necesario para manipulacion de red
    stdin_open: true
    tty: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # DVWA (Damn Vulnerable Web Application): target principal.
  # Aplicacion web con vulnerabilidades configurables (SQLi, XSS, command
  # injection, file inclusion, etc). Genera logs de Apache y MySQL que el
  # observador analiza.
  # ---------------------------------------------------------------------------
  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa
    hostname: dvwa
    networks:
      attack_net:
        ipv4_address: 10.10.0.10
      monitor_net:
    depends_on:
      - loki
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        tag: "dvwa"
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Mr. Robot: target WordPress simulado para el escenario mrrobot.
  # Replica los elementos clave del VulnHub Mr. Robot:1 CTF.
  # Accesible en attack_net 10.10.0.20 para el agente atacante.
  # ---------------------------------------------------------------------------
  mrrobot:
    build:
      context: ./mrrobot
    container_name: mrrobot
    hostname: mrrobot
    networks:
      attack_net:
        ipv4_address: 10.10.0.20
      monitor_net:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        tag: "mrrobot"
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # DC-1 (DCAU VulnHub) inspirado: target Drupal-style para ampliar evaluacion.
  # Credencial default admin/random, priv esc via SUID find, flag en /root.
  # Accesible en attack_net 10.10.0.30.
  # ---------------------------------------------------------------------------
  dc1:
    build:
      context: ./dc1
    container_name: dc1
    hostname: dc1
    networks:
      attack_net:
        ipv4_address: 10.10.0.30
      monitor_net:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        tag: "dc1"
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Basic Pentesting 1 (Josiah Pierce VulnHub) inspirado: user marlinspike,
  # priv esc via SUID vim.tiny, flag en /root. Distinto path post-compromiso
  # que dc1 y mrrobot.
  # Accesible en attack_net 10.10.0.40.
  # ---------------------------------------------------------------------------
  bpent:
    build:
      context: ./bpent
    container_name: bpent
    hostname: bpent
    networks:
      attack_net:
        ipv4_address: 10.10.0.40
      monitor_net:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        tag: "bpent"
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Log4Shell / Apache Solr 8.11.0 (CVE-2021-44228): victima Java para
  # validar generalizacion del sistema mas alla de stacks PHP/WordPress.
  # Vector: JNDI injection en parametros loggeados por Log4j 2.14.1.
  # Sin bruteforce ni webshell — RCE via una sola request GET.
  # Imagen oficial vulhub. Puerto 8983 expuesto a la red attack_net.
  # ---------------------------------------------------------------------------
  log4shell:
    image: vulhub/solr:8.11.0
    container_name: log4shell
    hostname: log4shell
    # OpenJDK 8 aborta al startup en kernels modernos por default ulimit nofile
    # muy alto. Forzamos un limite razonable.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      attack_net:
        ipv4_address: 10.10.0.50
      monitor_net:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        tag: "log4shell"
    deploy:
      resources:
        limits:
          memory: 2G

  # ---------------------------------------------------------------------------
  # Atlassian Confluence 7.13.6 (CVE-2022-26134): OGNL injection RCE.
  # Vector: payload OGNL en URI, output regresa en header X-Cmd-Response.
  # Clase distinta de ataque — expression injection (no command injection).
  # Requiere postgres backend. Ambos aislados en la misma red.
  # ---------------------------------------------------------------------------
  confluence:
    image: vulhub/confluence:7.13.6
    container_name: confluence
    hostname: confluence
    depends_on:
      - confluence-db
    networks:
      attack_net:
        ipv4_address: 10.10.0.60
      monitor_net:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        tag: "confluence"
    deploy:
      resources:
        limits:
          memory: 2G

  confluence-db:
    image: postgres:12.8-alpine
    container_name: confluence-db
    hostname: confluence-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: confluence
    networks:
      attack_net:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Loki: sistema de agregacion de logs. Modo monolitico (single binary).
  # Recibe logs via HTTP push API. El observador consulta via LogQL.
  # Usa ~200MB RAM vs ~3GB de Elasticsearch.
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    hostname: loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./logging/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      monitor_net:
        ipv4_address: 10.10.1.10
    ports:
      - "3100:3100"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Promtail: recolector de logs que lee los archivos de log de Docker
  # y los envia a Loki. Se monta el socket de Docker para autodiscovery
  # de containers.
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    hostname: promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./logging/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      monitor_net:
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Grafana: dashboard de visualizacion. Datasource Loki pre-provisionado.
  # Accesible en http://localhost:3000 (admin/admin).
  # Util para debug visual y para el dashboard de la tesis.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    hostname: grafana
    environment:
      # Modelo de amenaza: este Grafana es solo para inspeccion humana del lab
      # local. La password se inyecta via .env (GRAFANA_ADMIN_PASSWORD) y por
      # default se genera aleatoria en el docker-compose. Anonymous viewer se
      # deshabilita por default; activar solo en demos publicas controladas.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme-strong-password}
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./logging/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      monitor_net:
    ports:
      - "3000:3000"
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  # Red de ataque: conecta el atacante con los targets.
  # El atacante solo ve esta red (no ve la infra de monitoring).
  attack_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

  # Red de monitoring: conecta targets con Loki/Grafana.
  # Los targets estan en ambas redes para que sus logs lleguen a Loki.
  monitor_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.1.0/24

volumes:
  loki_data:
  grafana_data:
