server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Autodiscovery de containers Docker.
  # Promtail lee los archivos de log JSON que Docker escribe en
  # /var/lib/docker/containers/ y los envia a Loki con labels
  # del container (nombre, imagen, id).
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/**/*.log
    pipeline_stages:
      - docker: {}
      - labeldrop:
          - filename
